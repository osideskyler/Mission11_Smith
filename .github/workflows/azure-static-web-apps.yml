# Deploy the Vite app in /frontend to Azure Static Web Apps.
# Prerequisites: create the Static Web App with Azure CLI (see repo docs or README),
# then add the deployment token as repository secret AZURE_STATIC_WEB_APPS_API_TOKEN.
name: Deploy frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
      - phase06
    paths:
      - "frontend/**"
      - ".github/workflows/azure-static-web-apps.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          # Optional: set VITE_API_URL in repo Secrets (or Variables) for production API base.
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build
          test -f dist/index.html
          grep -q '/assets/' dist/index.html || (echo 'dist/index.html must reference /assets/ (Vite build).'; exit 1)

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Upload only Vite's dist/ (app_location + output_location must resolve to frontend/dist).
          app_location: "/"
          output_location: "frontend/dist"
          skip_app_build: true
